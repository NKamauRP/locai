Add llamadart to your pubspec.yaml
Configure Vulkan backend in hooks.yaml for android-arm64
Store your .gguf files in the app's documents directory (download on first run from HuggingFace or bundle smaller ones in assets)
Load and run with streaming — use StreamBuilder in Flutter to show tokens as they arrive

